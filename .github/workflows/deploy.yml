name: Deploy – Migrate DB & Vercel

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  migrate-database:
    # Only run when the PR was actually merged, not just closed
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Push database schema to Supabase
        run: npm run db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
